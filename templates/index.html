<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Journal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="app-container">
    
    <!-- Sidebar sliding close toggle arrow button -->
    <button class="toggle-arrow" id="toggle-arrow" onclick="toggleSidebar()">❮</button>

    <!-- SIDEBAR PANEL (Holds Water, Mood, and Goals) -->
    <div class="sidebar">
        <div class="sidebar-header">My Dashboard</div>
        
        <div class="sidebar-widgets">
            <!-- Water Intake Module -->
            <div class="widget-card">
                <div class="widget-title">Water Intake</div>
                <div class="bottles-grid">
                    <div class="bottle" id="bottle-1" onclick="fillBottle(1)"></div>
                    <div class="bottle" id="bottle-2" onclick="fillBottle(2)"></div>
                    <div class="bottle" id="bottle-3" onclick="fillBottle(3)"></div>
                    <div class="bottle" id="bottle-4" onclick="fillBottle(4)"></div>
                    <div class="bottle" id="bottle-5" onclick="fillBottle(5)"></div>
                    <div class="bottle" id="bottle-6" onclick="fillBottle(6)"></div>
                </div>
            </div>

            <!-- Mood Tracker Module -->
            <div class="widget-card">
                <div id="selected-mood" class="widget-title">Current Mood: None</div>
                <div class="mood-grid">
                    <button class="mood-btn" onclick="setMood('Happy')">😊 Happy</button>
                    <button class="mood-btn" onclick="setMood('Neutral')">😐 Neutral</button>
                    <button class="mood-btn" onclick="setMood('Sad')">😢 Sad</button>
                    <button class="mood-btn" onclick="setMood('Tired')">😫 Tired</button>
                </div>
            </div>

            <!-- Song Tracker Row -->
            <div class="widget-card">
                <div class="widget-title-spacing">Song of the Day</div>
                <input type="text" id="song-input" class="input-style" placeholder="What tracks are you looping today?">
            </div>

            <!-- Goal Tracker List -->
            <div class="widget-card">
                <div class="widget-title-spacing">Today's Goals</div>
                <div class="todo-input-bar">
                    <input type="text" id="todo-input" class="input-style" placeholder="Add a new goal...">
                    <button onclick="addTodo()" class="add-btn">Add</button>
                </div>
                <ul id="todo-list"></ul>
            </div>
        </div>
    </div>

    <!-- MAIN CONTAINER (Holds Date Retrieval, Mic, and Writing Workspace) -->
    <div class="main-container">
        <div class="workspace-header">
            <div class="date-container">
                <label>Journal Retrieval: </label>
                <input type="date" id="journal-date" onchange="loadEntryByDate()">
            </div>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>

        <!-- Reflection Text Area & Mic Elements -->
        <div class="editor-section">
            <div class="widget-title" style="margin-bottom: 8px;">Your Reflections</div>
            <textarea class="main-journal-textarea" id="journal-text" placeholder="Write your heart out here..."></textarea>
            
            <div class="bottom-action-bar">
                <button id="mic-btn" class="mic-style-btn">🎙️ Click to Speak</button>
                <button class="save-btn" onclick="saveEntry()">Save Day</button>
            </div>
        </div>
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
